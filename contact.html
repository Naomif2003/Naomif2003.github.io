        <div>

        <div class="row">
                <div class="col-7">
                    <!--Contact Form-->
                    <h3>Send your request</h3>

                    <form action="mailto:info@nuggiez" method="post" enctype="text/plain" class="contact-form">
                        <div class="container">
                            <div class="row">
                                <!--First Name input-->
                                <div class="col-6">
                                    <label for="">First Name</label>
                                    <Input type= "text" name="first-name id="first-name-Input placeholder="Joe">
                                </div>
                                <!--Last Name input-->
                                <div class="col-6">
                                    <label for=>Last name</label>
                                    <Input type= "text" name="last-name id="last-name-Input placeholder="Borg">
                                </div>
                            </div>
                        </div>

                        <!--Email address input-->
                        <div class="col-12">
                            <label for="email-input">Email Address</label>
                            <input type="text" name="email" id="email-input" placeholder="me@site.com">
                        </div>

                        <div class="col-12">
                            <label for="topic-dropdown">Topic</label>
                            <select name="topic" id="topic-dropdown">
                            <option value= "" disabled selection>"Please choose a topic"</option>
                            <option value="bacon">Hello, let's talk!</option>
                            <option value="salads">I'm having issues with the website</option>
                            <option value="cheese">Another topic</option>
                        </select>
                        </div>

                        <!--Subject input-->
                        <div class="col-12">
                            <div class="contactREQUEST">
                            <label for="subject-input">Subject</label>
                            <input type="text" name="subject" id="subject-input" placeholder="I wasn't supposed to put beef in the trifle!">
                            </div>
                        </div>
                        <!--Message input-->
                        <div class="col-12">
                            <label for="message input">Message</label>
                            <textarea name="message" id="message-input" cols="30" rows="10" placeholder= "please enter your message"></textarea>
                        </div>
                        <!--Buttons-->
                        <div class="col-12">
                            <button type="submit" class="button">Send message</button>
                            <button type="reset" class="button clear">Cancel</button>
                        </div>
                    </form>
                </div>
                <div class="col-1">
                    <!--Spancer-->
                </div>
                <div class="col-4">
                    <!--Sidebar-->
                    <div class="contact-details">
                        <h3>Mail</h3>
                        <p>
                            4, Hunger Games,

                    </div>
